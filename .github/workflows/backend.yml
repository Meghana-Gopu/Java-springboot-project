name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4


      # 2️⃣ Prepare EC2
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo yum install -y git maven java-17-amazon-corretto


      # 3️⃣ Clone / Pull repo
      - name: Clone / Pull Repository
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi


      # 4️⃣ Build Application
      - name: Build Maven Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests -U


      # 5️⃣ Stop Old Application (FIXED 143 ERROR)
      - name: Stop Old Application
        uses: appleboy/ssh-action@v1.1.0
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Stopping old application..."
            pkill -f datastore-0.0.7.jar || true
            sleep 5
            pkill -9 -f datastore-0.0.7.jar || true
            echo "Old application stopped"


      # 6️⃣ Start Application
      - name: Start Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            LOG_DIR=/var/log/app

            sudo mkdir -p $LOG_DIR
            sudo chown ec2-user:ec2-user $LOG_DIR

            cd /home/ec2-user/app/Java-springboot-project/backend/target

            nohup env \
              MYSQL_HOST=${{ secrets.DB_HOST }} \
              MYSQL_PORT=3306 \
              MYSQL_USERNAME=${{ secrets.DB_USERNAME }} \
              MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              LOG_FILE_PATH=$LOG_DIR/datastore.log \
              java -jar datastore-0.0.7.jar \
              --server.port=8084 \
              > $LOG_DIR/nohup.out 2>&1 &

            echo "Application started"


      # 7️⃣ Wait for Startup
      - name: Wait for App Startup
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Waiting for application to start..."
            sleep 40


      # 8️⃣ Verify Application
      - name: Verify Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Checking if application is running..."

            if pgrep -f "datastore-0.0.7.jar" > /dev/null
            then
              echo "✅ Application started successfully"
            else
              echo "❌ Application failed to start"
              exit 1
            fi
