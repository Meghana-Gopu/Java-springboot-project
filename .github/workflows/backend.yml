name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Prepare EC2
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "Installing dependencies if missing..."

            if ! command -v git &>/dev/null; then
              sudo yum install -y git
            fi

            if ! command -v mvn &>/dev/null; then
              sudo yum install -y maven
            fi

            if ! java -version &>/dev/null 2>&1; then
              sudo yum install -y java-17-amazon-corretto
            fi

      # 3️⃣ Clone / Pull
      - name: Clone Repo
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/app
            REPO=Java-springboot-project
            URL=https://github.com/CloudTechDevOps/Java-springboot-project.git

            mkdir -p $APP_DIR

            if [ -d "$APP_DIR/$REPO/.git" ]; then
              cd $APP_DIR/$REPO
              git reset --hard
              git pull origin main
            else
              cd $APP_DIR
              git clone $URL
            fi

      # 4️⃣ Build
      - name: Build Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests

      # 5️⃣ Stop Service
      - name: Stop Service
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Stopping service..."
            sudo systemctl stop backend || true

      # 6️⃣ Start Service
      - name: Start Service
        uses: appleboy/ssh-action@v1.1.0
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Starting service..."

            sudo systemctl daemon-reload
            sudo systemctl start backend

            sleep 5

            sudo systemctl status backend

      # 7️⃣ Health Check
      - name: Health Check
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Checking health..."

            RETRIES=12
            COUNT=0

            until curl -sf http://localhost:8084/actuator/health > /dev/null; do
              COUNT=$((COUNT+1))

              if [ "$COUNT" -ge "$RETRIES" ]; then
                echo "App failed to start"
                sudo systemctl status backend
                exit 1
              fi

              sleep 5
            done

            echo "Deployment successful!"
