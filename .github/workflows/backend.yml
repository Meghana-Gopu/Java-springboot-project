name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4


      # 2️⃣ Prepare EC2
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "🔍 Checking required tools..."

            if ! command -v git &>/dev/null; then
              sudo yum install -y git
            fi

            if ! command -v mvn &>/dev/null; then
              sudo yum install -y maven
            fi

            if ! java -version &>/dev/null 2>&1; then
              sudo yum install -y java-17-amazon-corretto
            fi

            echo "✅ Dependencies ready."


      # 3️⃣ Clone / Pull Repo
      - name: Clone / Pull Repository
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/$REPO_NAME/.git" ]; then
              echo "🔄 Pulling latest code..."
              cd "$APP_DIR/$REPO_NAME"
              git reset --hard
              git pull origin main
            else
              echo "📥 Cloning repository..."
              cd "$APP_DIR"
              git clone "$REPO_URL"
            fi


      # 4️⃣ Build Application
      - name: Build Maven Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests -U

            echo "✅ Build complete"


      # 5️⃣ Stop Service
      - name: Stop Service
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🛑 Stopping backend..."
            sudo systemctl stop backend || true
            sleep 5


      # 6️⃣ Start Service
      - name: Start Service
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🚀 Starting backend..."

            sudo systemctl daemon-reload
            sudo systemctl start backend

            sleep 5

            sudo systemctl status backend --no-pager


      # 7️⃣ Final Verification
      - name: Final Verification
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🔍 Final verification..."

            if sudo systemctl is-active --quiet backend; then
              echo "✅ Backend service running"
            else
              echo "❌ Backend service not running"
              sudo systemctl status backend
              exit 1
            fi

            echo "🎉 Deployment completed successfully!"
            
