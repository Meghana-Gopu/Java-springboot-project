name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Prepare EC2 (install Java, Maven, Git)
      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            sudo yum install -y git maven java-17-amazon-corretto

      # 3️⃣ Clone or pull repo on EC2
      - name: Clone / Pull Repository
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git
            mkdir -p $APP_DIR
            cd $APP_DIR
            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
            fi

      # 4️⃣ Build Maven app
      - name: Build Maven Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests -U

      # 5️⃣ Stop old application safely
      - name: Stop Old Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script_stop: false
          script: |
            # pkill returns 0 if it killed something, 1 if nothing matched — both are fine.
            # No set -e here so exit code 1 (nothing to kill) is not fatal.
            if pkill -TERM -f "java.*datastore-0.0.7.jar"; then
              echo "SIGTERM sent, waiting for graceful shutdown..."
              sleep 8
              if pkill -0 -f "java.*datastore-0.0.7.jar" 2>/dev/null; then
                echo "Process still alive, sending SIGKILL..."
                pkill -KILL -f "java.*datastore-0.0.7.jar" || true
                sleep 2
              fi
              echo "✅ Old application stopped"
            else
              echo "No running application found, skipping stop"
            fi

      # 6️⃣ Start new application
      # Secrets are forwarded as env vars via `envs` so they are
      # available inside the SSH session — GitHub expressions like
      # ${{ secrets.X }} are NOT expanded inside remote SSH scripts.
      - name: Start Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          envs: DB_HOST,DB_USERNAME,DB_PASSWORD
          script: |
            set -e
            LOG_DIR=/var/log/app
            sudo mkdir -p $LOG_DIR
            sudo chown ec2-user:ec2-user $LOG_DIR
            cd /home/ec2-user/app/Java-springboot-project/backend/target
            nohup env \
              MYSQL_HOST=$DB_HOST \
              MYSQL_PORT=3306 \
              MYSQL_USERNAME=$DB_USERNAME \
              MYSQL_PASSWORD=$DB_PASSWORD \
              LOG_FILE_PATH=$LOG_DIR/datastore.log \
              java -jar datastore-0.0.7.jar \
              --server.port=8084 \
              > $LOG_DIR/nohup.out 2>&1 &
            echo "✅ Application process launched"
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # 7️⃣ Wait for app startup with retry loop instead of fixed sleep
      - name: Wait for App Startup
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            echo "Waiting for application to become available on port 8084..."
            MAX_RETRIES=24   # 24 x 5s = 2 minutes max wait
            RETRY=0
            until curl -sf http://localhost:8084/actuator/health > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
                echo "❌ Application did not start within timeout. Last log lines:"
                tail -50 /var/log/app/nohup.out || true
                exit 1
              fi
              echo "  Attempt $RETRY/$MAX_RETRIES — not ready yet, retrying in 5s..."
              sleep 5
            done
            echo "✅ Application is accepting connections"

      # 8️⃣ Verify app and DB connectivity via actuator
      - name: Verify DB Connection
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            HEALTH=$(curl -sf http://localhost:8084/actuator/health)
            echo "Health endpoint response: $HEALTH"

            # Check overall application status
            if [[ "$HEALTH" != *'"status":"UP"'* ]]; then
              echo "❌ Application not UP!"
              exit 1
            fi
            echo "✅ Application is UP"

            # Check DB health component if exposed by actuator
            if [[ "$HEALTH" == *'"db"'* ]]; then
              if [[ "$HEALTH" == *'"db":{"status":"UP"'* ]]; then
                echo "✅ DB is UP"
              else
                echo "❌ DB is not UP!"
                exit 1
              fi
            else
              echo "⚠️ DB health not exposed, skipping check"
            fi

            echo "✅ Deployment verified successfully"
