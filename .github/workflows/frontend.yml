name: Deploy Streamlit Frontend to EC2

on:
  workflow_run:
    workflows: ["Deploy Backend to EC2"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/front
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git
            FRONTEND_DIR=$APP_DIR/$REPO_NAME/frontend
            SERVICE_FILE=/etc/systemd/system/frontend.service

            echo "🚀 Starting frontend deployment..."

            # ── 1. Install Python only if missing ──────────────────────────────
            if ! command -v python3 &>/dev/null || ! command -v pip3 &>/dev/null; then
              echo "📦 Installing Python..."
              sudo dnf install -y python3 python3-pip
            else
              echo "✅ Python already installed, skipping."
            fi

            # ── 2. Clone or pull latest code ───────────────────────────────────
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ -d "$REPO_NAME/.git" ]; then
              echo "🔄 Pulling latest code..."
              cd "$REPO_NAME"
              git reset --hard
              git pull origin main
            else
              echo "📥 Cloning repository..."
              git clone "$REPO_URL"
              cd "$REPO_NAME"
            fi

            # ── 3. Set up virtual environment ──────────────────────────────────
            cd "$FRONTEND_DIR"

            if [ ! -d "venv" ]; then
              echo "🐍 Creating virtual environment..."
              python3 -m venv venv
            fi

            # shellcheck disable=SC1091
            source "$FRONTEND_DIR/venv/bin/activate"

            echo "📦 Installing dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            deactivate

            # ── 4. Write systemd service file ──────────────────────────────────
            # NOTE: heredoc must be at column-0 (no leading spaces) to work correctly
            echo "⚙️  Writing systemd service..."
            sudo tee "$SERVICE_FILE" > /dev/null <<'SYSTEMD'
            [Unit]
            Description=Streamlit Frontend App
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/front/Java-springboot-project/frontend

            ExecStart=/bin/bash -c 'source /home/ec2-user/front/Java-springboot-project/frontend/venv/bin/activate && streamlit run app.py --server.port=8501 --server.address=0.0.0.0'

            Environment=API_URL=http://localhost:8084

            Restart=always
            RestartSec=5
            StopSignal=SIGTERM
            TimeoutStopSec=10

            StandardOutput=append:/home/ec2-user/frontend.log
            StandardError=append:/home/ec2-user/frontend-error.log

            [Install]
            WantedBy=multi-user.target
            SYSTEMD

            # ── 5. Reload systemd and restart service ──────────────────────────
            echo "🔁 Reloading systemd and restarting service..."
            sudo systemctl daemon-reload
            sudo systemctl enable frontend
            sudo systemctl restart frontend

            # ── 6. Verify service started successfully ─────────────────────────
            echo "🔍 Checking service status..."
            sleep 3
            if sudo systemctl is-active --quiet frontend; then
              echo "✅ Frontend service is running."
            else
              echo "❌ Frontend service failed to start. Last logs:"
              sudo journalctl -u frontend -n 30 --no-pager
              exit 1
            fi

            echo "🎉 Deployment successful! Streamlit running on port 8501."
